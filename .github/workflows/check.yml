name: trailscraper standard checks pipeline

on:
  push:
    branches:
      - master
      - move-to-uv
  pull_request: 
  schedule:
    - cron: '0 0 1 * *'

permissions: {}

jobs:
  check-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", 3.11, 3.12, 3.13, 3.14 ]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: ./go setup
      - name: Check Code Style
        run: ./go check
      - name: Run Tests
        run: ./go test
      - name: Build artifacts
        run: ./go build-artifacts
      - name: Test artifacts can be installed and run correctly
        run: PYTHON_VERSION=${{ matrix.python-version }} ./go smoketest-artifacts
      - name: Build docker container
        run: PYTHON_VERSION=${{ matrix.python-version }} ./go build-docker
      - name: Test docker container runs correctly
        run: ./go smoketest-docker
  all-tests-green: # to match in branch protection rules that don't work for matrix jobs
    needs: check-and-test
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Dummy, to have a branch condition"
  codeql-analyse:
    permissions:
      security-events: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 2
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
